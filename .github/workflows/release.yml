name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifact (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.runs_on || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: trekr-linux-x86_64
            archive_name: trekr-linux-x86_64.tar.gz
            package_command: tar -czf trekr-linux-x86_64.tar.gz -C target/release trekr
          - os: ubuntu-latest
            artifact_name: trekr-linux-aarch64
            archive_name: trekr-linux-aarch64.tar.gz
            runs_on: ubuntu-24.04-arm
            package_command: tar -czf trekr-linux-aarch64.tar.gz -C target/release trekr
          - os: windows-latest
            artifact_name: trekr-windows-x86_64
            archive_name: trekr-windows-x86_64.zip
            package_command: Compress-Archive -Path target/release/trekr.exe -DestinationPath trekr-windows-x86_64.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Build
        run: cargo build --release --bin trekr

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: ${{ matrix.package_command }}

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.package_command }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.run_number }}-${{ github.sha }}
          name: Main build ${{ github.run_number }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/trekr-linux-x86_64/trekr-linux-x86_64.tar.gz
            dist/trekr-linux-aarch64/trekr-linux-aarch64.tar.gz
            dist/trekr-windows-x86_64/trekr-windows-x86_64.zip
