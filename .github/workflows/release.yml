name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifact (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.runs_on || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: trekr-linux-x86_64
            archive_name: trekr-linux-x86_64.tar.gz
            package_command: tar -czf trekr-linux-x86_64.tar.gz -C target/release trekr
          - os: ubuntu-latest
            artifact_name: trekr-linux-aarch64
            archive_name: trekr-linux-aarch64.tar.gz
            runs_on: ubuntu-24.04-arm
            package_command: tar -czf trekr-linux-aarch64.tar.gz -C target/release trekr
          - os: windows-latest
            artifact_name: trekr-windows-x86_64
            archive_name: trekr-windows-x86_64.zip
            package_command: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxss-dev \
            libxtst-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libdbus-1-dev \
            libibus-1.0-dev \
            libudev-dev \
            libdrm-dev \
            libgbm-dev

      - name: Build
        run: cargo build --release --bin trekr

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: ${{ matrix.package_command }}

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stageDir = "target/release/trekr-windows-x86_64"
          if (Test-Path $stageDir) {
            Remove-Item -Recurse -Force $stageDir
          }
          New-Item -ItemType Directory -Path $stageDir | Out-Null
          Copy-Item "target/release/trekr.exe" -Destination $stageDir -Force

          $sdlDlls = Get-ChildItem -Path "target/release", "target/release/deps" -Filter "SDL3*.dll" -File -Recurse -ErrorAction SilentlyContinue |
            Sort-Object FullName -Unique
          if (-not $sdlDlls -or $sdlDlls.Count -eq 0) {
            throw "Could not locate SDL3 runtime DLLs in release output."
          }

          foreach ($dll in $sdlDlls) {
            Copy-Item $dll.FullName -Destination $stageDir -Force
          }

          Compress-Archive -Path "$stageDir/*" -DestinationPath "trekr-windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.run_number }}-${{ github.sha }}
          name: Main build ${{ github.run_number }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/trekr-linux-x86_64/trekr-linux-x86_64.tar.gz
            dist/trekr-linux-aarch64/trekr-linux-aarch64.tar.gz
            dist/trekr-windows-x86_64/trekr-windows-x86_64.zip
